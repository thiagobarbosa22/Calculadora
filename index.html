<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Desktop Retenção - Black Edition v8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="card">
    <button class="dark-toggle" onclick="document.body.classList.toggle('dark')">🌓</button>
    <div class="header">
        <h2 style="margin:0; color: var(--accent);">Desktop Retenção</h2>
        <small style="color: var(--text-secondary);">Calculadora de Multas & Ofertas</small>
    </div>

    <div class="tabs">
        <button id="t1" class="active" onclick="tab('ret')">💬 Oferta</button>
        <button id="t2" onclick="tab('calc')">🧮 Multas</button>
        <button id="t3" onclick="tab('enc')">📅 Encaixe</button>
    </div>

    <div id="v-ret">
        <div class="section">
            <label>👤 Nome do Cliente</label>
            <input type="text" id="n" placeholder="Ex: João Silva">
            <label>🏙️ Cidade</label>
            <input list="cidades_oferta" id="cid" oninput="checkCid()" placeholder="Selecione a cidade">
            <div id="concorrencia" class="alert-box">🚀 <b>Região Estratégica:</b> Desconto de R$ 50,00 Liberado!</div>
            <div class="row">
                <div><label>💰 Plano Atual</label><input type="number" id="vA" value="109.99"></div>
                <div><label>📉 Desconto</label>
                    <select id="vD">
                        <option value="10">R$ 10,00</option><option value="20">R$ 20,00</option>
                        <option value="30">R$ 30,00</option><option value="40">R$ 40,00</option>
                        <option value="50" id="o50" disabled>R$ 50,00*</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div><label>⏳ Prazo</label><select id="prazo"><option value="6">6 Meses</option><option value="12">12 Meses</option></select></div>
                <div><label>🎁 Isenção</label><select id="isencao"><option value="0">Nenhuma</option><option value="1">1 Mês Grátis</option><option value="2">2 Meses Grátis</option></select></div>
            </div>
            <label>🎭 Abordagem</label>
            <select id="abord">
                <option value="1">Direta (Foco em R$)</option>
                <option value="2">Empática (Valorização)</option>
                <option value="3">VIP (Exclusividade)</option>
                <option value="4">Urgente (Fechamento)</option>
                <option value="5">Custo-Benefício (Lógica)</option>
                <option value="6">Retenção Crítica (Última Cartada)</option>
                <option value="7">Técnica (Oscilação/Instabilidade)</option>
                <option value="8">Técnica (Sem Conexão Total)</option>
            </select>
        </div>
        <button class="btn-main" onclick="gerarOferta()">📝 Gerar Texto de Oferta</button>
        <div id="resO" class="res-box"></div>
        <button id="cO" class="btn-main btn-copy hide" onclick="copy('o')">📋 Copiar Mensagem</button>
    </div>

    <div id="v-calc" class="hide">
        <div class="section">
            <label>📜 Tabela de Multa</label>
            <select id="tabelaMulta">
                <option value="29.17">Antiga (R$ 29,17/mês)</option>
                <option value="40.00" selected>Nova (R$ 40,00/mês)</option>
            </select>

            <label>🛡️ Fidelidade Instalação?</label>
            <select id="fielInstal" onchange="toggleCalc()"><option value="nao">Não</option><option value="sim">Sim</option></select>

            <div class="row">
                <div id="boxMeses" class="hide">
                    <label>⏳ Meses Restantes</label>
                    <input type="number" id="mR" value="6">
                </div>
            </div>
            <div class="row">
                <div><label>🗓️ Dias de Uso</label><input type="number" id="dC" value="15"></div>
                <div><label>💵 Atrasos (R$)</label><input type="number" id="vAtra" value="0"></div>
            </div>
        </div>
        <button class="btn-main" onclick="calc()">🧮 Calcular Multa</button>
        <div id="resC" class="res-box"></div>
        <button id="cC" class="btn-main btn-copy hide" onclick="copy('c')">📋 Copiar Script de Multa</button>
    </div>

    <div id="v-enc" class="hide">
        <div class="section">
            <label>📝 SA</label><input type="text" id="eSA">
            <label>🏙️ Cidade</label><input list="listaCidadesEnc" id="eCid">
            <div class="row">
                <div><label>📅 Data</label><input type="date" id="eData"></div>
                <div><label>⏰ Período</label><select id="ePer"><option value="manhã">Manhã</option><option value="tarde">Tarde</option></select></div>
            </div>
            <label>🚫 Restrição</label><input type="text" id="eRest">
            <label>🗣️ Reclamação</label><textarea id="eRecl" rows="2"></textarea>
        </div>
        <button class="btn-main" onclick="gerarEnc()">📝 Gerar Encaixe</button>
        <div id="resE" class="res-box" style="white-space: pre-wrap; font-family: monospace;"></div>
        <button id="cE" class="btn-main btn-copy hide" onclick="copy('e')">📋 Copiar Encaixe</button>
    </div>
</div>

<datalist id="cidades_oferta">
    <option value="Americana"> <option value="Araraquara"> <option value="Avaré"> <option value="Barra Bonita"> <option value="Barretos"> <option value="Bauru"> <option value="Bebedouro"> <option value="Campinas"> <option value="Francisco Morato"> <option value="Franco da Rocha"> <option value="Guarujá"> <option value="Hortolândia"> <option value="Jaú"> <option value="Jundiaí"> <option value="Lençóis Paulista"> <option value="Limeira"> <option value="Praia Grande"> <option value="São Carlos"> <option value="São José dos Campos"> <option value="Sumaré"> <option value="Rio Claro">
</datalist>
<datalist id="listaCidadesEnc"></datalist> <script src="script.js"></script>

<div id="ia-container">
    <div id="ia-window">
        <div id="ia-header">
            <span>🤖 Dolly</span>
            <button onclick="toggleIA()" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;">✖</button>
        </div>
        <div id="ia-chat">
            <div class="ia-msg ia-bot">Olá! Aqui é o assistente de retenção. Me conta o caso que eu te ajudo a reverter esse cancelamento.</div>
        </div>
        <div id="ia-input-area">
            <input type="text" id="ia-input" placeholder="Pergunte algo...">
            <button id="ia-send" onclick="askGemini()">➤</button>
        </div>
    </div>
    <button id="ia-button" onclick="toggleIA()">✨</button>
</div>

<script>
function toggleIA() {
    const win = document.getElementById('ia-window');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}

async function askGemini() {
    const input = document.getElementById('ia-input');
    const chat = document.getElementById('ia-chat');
    const msg = input.value.trim();
    if (!msg) return;

    chat.innerHTML += `<div class="ia-msg ia-user">${msg}</div>`;
    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("https://calculadora-xggm.onrender.com/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ msg })
        });

        if (!response.ok) {
            const data = await response.json();
            throw new Error(`Erro ${response.status}: ${data.error || "Falha no backend"}`);
        }

        const data = await response.json();
        const text = data.text || "Sem resposta da IA.";
        chat.innerHTML += `<div class="ia-msg ia-bot">${text.replace(/\n/g, "<br>")}</div>`;
    } catch (e) {
        chat.innerHTML += `<div class="ia-msg ia-error"><b>⚠️ Falha na IA:</b><br>${e.message} <br><br><i>Verifique se o seu servidor Node.js (localhost:3000) está rodando!</i></div>`;
        console.error("Erro técnico:", e);
    }

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById('ia-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') askGemini();
});
</script>

</body>
</html>
